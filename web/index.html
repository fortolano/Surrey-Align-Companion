<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#016183" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SurreyALIGN" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Icons -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

  <title>SurreyALIGN</title>

  <style>
    /* PWA Global Reset */
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: fixed;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    body {
      overscroll-behavior-y: contain;
      touch-action: manipulation;
    }

    * {
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    input, textarea, [contenteditable="true"] {
      -webkit-user-select: auto;
      user-select: auto;
    }

    img, a {
      -webkit-touch-callout: none;
    }

    /* Hide scrollbars */
    ::-webkit-scrollbar {
      display: none;
    }
    * {
      scrollbar-width: none;
    }

    /* Remove browser focus outlines */
    button:focus, [role="button"]:focus, a:focus {
      outline: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
      });
    }

    // Detect standalone PWA mode
    window.__isPWA = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;

    // Prevent pinch-to-zoom
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    document.addEventListener('gestureend', function(e) { e.preventDefault(); });

    // Prevent multi-touch zoom
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) { e.preventDefault(); }
    }, { passive: false });

    // Prevent double-tap zoom
    var lastTouchEnd = 0;
    document.addEventListener('touchend', function(e) {
      var now = Date.now();
      if (now - lastTouchEnd <= 300) { e.preventDefault(); }
      lastTouchEnd = now;
    }, false);

    // Disable context menu on non-input elements
    document.addEventListener('contextmenu', function(e) {
      var tag = e.target.tagName;
      if (tag !== 'INPUT' && tag !== 'TEXTAREA') { e.preventDefault(); }
    });
  </script>
</body>
</html>
